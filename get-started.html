<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0D9488;--teal-light:#14B8A6;--teal-dark:#0F766E;--teal-bg:#F0FDFA;--grey900:#0f172a;--radius:8px;--radius-lg:12px}
body{font-family:'DM Sans',sans-serif;color:#e2e8f0;background:var(--grey900);min-height:100vh;display:flex;flex-direction:column}
.top-bar{padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Source Serif 4',serif;font-size:22px;font-weight:700;color:white;text-decoration:none}.logo span{color:var(--teal-light)}
.login-link{color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;padding:8px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius)}.login-link:hover{color:white;border-color:rgba(255,255,255,0.3)}
.wrap{flex:1;display:flex;flex-direction:column;max-width:720px;width:100%;margin:0 auto;padding:0 20px 20px}
.hdr{text-align:center;padding:40px 0 30px}
.hdr h1{font-family:'Source Serif 4',serif;font-size:32px;font-weight:700;color:white;margin-bottom:8px}
.hdr p{color:rgba(255,255,255,0.5);font-size:15px}
#msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:16px}
.mb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:16px 16px 16px 4px;padding:16px 20px;color:rgba(255,255,255,0.85);font-size:14px;line-height:1.65;max-width:88%}.mb strong{color:var(--teal-light)}.mb a{color:var(--teal-light)}
.mu{background:var(--teal);border-radius:16px 16px 4px 16px;padding:12px 18px;color:white;font-size:14px;max-width:85%;align-self:flex-end}
.mt{background:rgba(255,255,255,0.04);border-radius:16px 16px 16px 4px;padding:16px 20px;color:rgba(255,255,255,0.4);font-size:14px;max-width:85%}
.mf{background:rgba(13,148,136,0.15);border:1px solid rgba(13,148,136,0.3);border-radius:12px 12px 4px 12px;padding:12px 18px;color:var(--teal-light);font-size:13px;align-self:flex-end}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ob{padding:10px 18px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}.ob:hover{background:var(--teal);border-color:var(--teal);color:white}
.ua{border:2px dashed rgba(255,255,255,0.15);border-radius:var(--radius-lg);padding:30px;text-align:center;cursor:pointer;margin-top:12px}.ua:hover{border-color:var(--teal);background:rgba(13,148,136,0.05)}
.ua h3{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:6px}.ua p{color:rgba(255,255,255,0.3);font-size:12px}
.ib{display:flex;gap:10px;padding:12px 0;flex-shrink:0}
.ci{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 18px;color:white;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}.ci:focus{border-color:var(--teal)}.ci::placeholder{color:rgba(255,255,255,0.25)}
.sb{background:var(--teal);border:none;border-radius:12px;padding:14px 24px;color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}.sb:hover{background:var(--teal-dark)}
.cb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}.cb:hover{border-color:var(--teal);color:var(--teal-light)}
.dc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-lg);overflow:hidden;margin-top:12px}
.dch{background:rgba(13,148,136,0.1);padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.dch h3{color:var(--teal-light);font-size:15px;font-weight:700}.dch .da{color:rgba(255,255,255,0.5);font-size:12px;margin-top:4px}
.ds{padding:10px 20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.3);border-bottom:1px solid rgba(255,255,255,0.04)}
.dr{display:flex;justify-content:space-between;padding:8px 20px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.dl{color:rgba(255,255,255,0.5)}.dv{color:white;font-weight:600;font-variant-numeric:tabular-nums}.dv.g{color:#6ee7b7}.dv.w{color:#fbbf24}.dv.b{color:#fca5a5}.dv.t{color:var(--teal-light)}
.dvd{padding:14px 20px;text-align:center;font-weight:700;font-size:14px}.dvd.g{background:rgba(5,150,105,0.1);color:#6ee7b7}.dvd.w{background:rgba(217,119,6,0.1);color:#fbbf24}.dvd.b{background:rgba(220,38,38,0.1);color:#fca5a5}
.nar{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:16px 20px;margin-top:12px;color:rgba(255,255,255,0.7);font-size:13px;line-height:1.7}
.pw{background:linear-gradient(135deg,rgba(13,148,136,0.15),rgba(13,148,136,0.05));border:1px solid rgba(13,148,136,0.3);border-radius:var(--radius-lg);padding:28px;text-align:center;margin-top:16px}
.pw h2{font-family:'Source Serif 4',serif;font-size:22px;color:white;margin-bottom:8px}
.pw p{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:20px;line-height:1.5}
.pwb{display:inline-block;padding:14px 36px;background:var(--teal);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none}.pwb:hover{background:var(--teal-dark)}
.pf{display:flex;gap:20px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.pfi{color:rgba(255,255,255,0.6);font-size:12px}.pfi::before{content:'✓ ';color:var(--teal-light)}
@media(max-width:768px){.hdr h1{font-size:24px}.wrap{padding:0 12px 12px}}
</style>
</head>
<body>
<div class="top-bar"><a class="logo" href="index.html">get<span>kredit.ai</span></a><a class="login-link" href="login.html">Sign in →</a></div>
<div class="wrap">
<div class="hdr"><h1>Write your credit paper in 5 minutes</h1><p>Upload your docs. AI does the rest.</p></div>
<div id="msgs"></div>
<div class="ib">
<label class="cb"><input type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this.files[0])">📎</label>
<input class="ci" id="inp" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')sendMsg()">
<button class="sb" onclick="sendMsg()">Send</button>
</div>
</div>
<script>
var D={type:'',f:{},narrative:'',flags:[],docs:[],shown:{},asked:{}};
var hist=[];var curQ=null;var qq=[];var resultsShown=false;
function $(i){return document.getElementById(i)}
function fmt(v){if(!v||isNaN(v))return'—';return'$'+Math.round(Number(v)).toLocaleString('en-AU')}
function pct(v){if(!v||isNaN(v))return'—';return(Number(v)*100).toFixed(1)+'%'}
function ab(h){var m=$('msgs');m.innerHTML+='<div class="mb">'+h+'</div>';m.scrollTop=m.scrollHeight}
function au(t){var m=$('msgs');m.innerHTML+='<div class="mu">'+t.replace(/</g,'&lt;')+'</div>';m.scrollTop=m.scrollHeight}
function af(n,s){var m=$('msgs');m.innerHTML+='<div class="mf">📎 '+n+' ('+s+')</div>';m.scrollTop=m.scrollHeight}
function at(t){var m=$('msgs');m.innerHTML+='<div class="mt" id="typ">'+(t||'✦ Thinking...')+'</div>';m.scrollTop=m.scrollHeight}
function rt(){var t=$('typ');if(t)t.remove()}
function st(t){var e=$('typ');if(e)e.textContent=t}

// Init
ab('G\'day — I\'m your AI credit analyst. I\'ll help you build a full credit paper and feasibility in minutes, not hours.<br><br><strong>What type of finance are you looking for?</strong><div class="opts" id="s1"><button class="ob" onclick="pk(\'development\')">🏗️ Development</button><button class="ob" onclick="pk(\'residual\')">🏘️ Residual Stock</button><button class="ob" onclick="pk(\'investment\')">📈 Investment</button><button class="ob" onclick="pk(\'site\')">📍 Site Acquisition</button><button class="ob" onclick="pk(\'bridging\')">🔄 Bridging</button></div>');

function pk(t){
  D.type=t;var l={development:'Development Finance',residual:'Residual Stock',investment:'Investment Loan',site:'Site Acquisition',bridging:'Bridging Finance'};
  au(l[t]);var o=$('s1');if(o)o.remove();
  setTimeout(function(){ab('Great — <strong>'+l[t]+'</strong>. Upload everything you\'ve got — valuations, contracts, QS reports, borrower financials. I\'ll extract everything automatically.<div class="ua" onclick="$(\'fu\').click()"><input type="file" id="fu" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this.files[0])"><h3>📄 Drop files here or click to upload</h3><p>PDF, images — any format, any size</p></div><br><span style="font-size:12px;opacity:0.4">Or just type your deal details below.</span>');},300);
}

async function handleFile(file){
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  af(file.name,(file.size/1024/1024).toFixed(1)+'MB');
  D.docs.push(file.name);
  var msgs=['✦ Reading document...','✦ Extracting property details...','✦ Analysing financials...','✦ Building deal profile...','✦ Almost there...'];
  var mi=0;at(msgs[0]);var li=setInterval(function(){mi=(mi+1)%msgs.length;st(msgs[mi])},2200);

  try{
    if(ext==='pdf'){
      var buf=await file.arrayBuffer();
      
      // Step 1: Try pdf-lib compression (same as development-chat)
      var sendBase64=null;
      try{
        st('✦ Compressing PDF...');
        var srcDoc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var pageCount=srcDoc.getPageCount();
        var maxPages=Math.min(pageCount,12);
        var newDoc=await PDFLib.PDFDocument.create();
        var indices=[];for(var i=0;i<maxPages;i++)indices.push(i);
        var copied=await newDoc.copyPages(srcDoc,indices);
        copied.forEach(function(p){newDoc.addPage(p)});
        var newBytes=await newDoc.save();
        var sizeMB=newBytes.byteLength/1024/1024;
        console.log('PDF compressed: '+pageCount+' pages → '+maxPages+' pages, '+sizeMB.toFixed(1)+'MB');
        
        if(sizeMB<4.5){
          // Small enough — send as document directly (best extraction quality)
          var bytes=new Uint8Array(newBytes);var bin='';var ch=8192;
          for(var i=0;i<bytes.length;i+=ch)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));
          sendBase64=btoa(bin);
        }
      }catch(e){console.warn('PDF compression failed:',e);}
      
      if(sendBase64){
        // Send as single PDF document — same as development-chat
        st('✦ AI analysing document...');
        try{
          var r=await fetch('/.netlify/functions/doc-reader',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({fileBase64:sendBase64,fileType:'pdf',docType:D.type||'auto-detect',existingData:D.f})});
          if(r.ok){var d=await r.json();console.log('doc-reader result:',d);mergeDocReader(d);}
          else{console.error('doc-reader error:',r.status,await r.text());}
        }catch(e){console.error('doc-reader err:',e);}
      } else {
        // Too large even after compression — render pages as images
        st('✦ Large PDF — rendering pages...');
        var pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
        var pgs=[];var mx=Math.min(pdf.numPages,20);
        for(var p=1;p<=mx;p++){
          st('✦ Scanning page '+p+'/'+mx+'...');
          var pg=await pdf.getPage(p);var vp=pg.getViewport({scale:1.5});
          var cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
          await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
          pgs.push(cv.toDataURL('image/jpeg',0.7).split(',')[1]);
        }
        // Send page images to doc-reader in batches
        for(var b=0;b<pgs.length;b+=8){
          var bn=Math.floor(b/8)+1;var tb=Math.ceil(pgs.length/8);
          st('✦ AI analysing pages '+(b+1)+'-'+Math.min(b+8,pgs.length)+' ('+bn+'/'+tb+')...');
          var batch=pgs.slice(b,b+8);
          try{
            var r=await fetch('/.netlify/functions/doc-reader',{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({images:batch,fileType:'images',docType:D.type||'auto-detect',existingData:D.f})});
            if(r.ok){var d=await r.json();console.log('doc-reader batch '+bn+':',d);mergeDocReader(d);}
            else{console.error('doc-reader batch '+bn+' error:',r.status);}
          }catch(e){console.error('batch err:',e);}
        }
      }
    } else {
      var b64=await new Promise(function(r){var rd=new FileReader();rd.onload=function(e){r(e.target.result.split(',')[1])};rd.readAsDataURL(file)});
      st('✦ AI analysing document...');
      var r=await fetch('/.netlify/functions/doc-reader',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fileBase64:b64,fileType:ext,docType:D.type||'auto-detect',existingData:D.f})});
      if(r.ok){var d=await r.json();console.log('doc-reader:',d);mergeDocReader(d);}
    }
    clearInterval(li);rt();showExtracted();
  }catch(e){clearInterval(li);rt();ab('Had trouble with that file. Try another or type details.');console.error(e);}
}

function mergeFlat(d){
  if(d.units&&d.units.length){D.f.unitBreakdown=d.units;D.f.units=d.units.length;var tv=0;d.units.forEach(function(u){tv+=u.valuation||0});if(tv)D.f.grv=tv;}
  if(d.projectName)D.f.projectName=d.projectName;
  if(d.address)D.f.address=d.address;
  if(d.borrowerName)D.f.borrowerName=d.borrowerName;
}

function mergeDocReader(d){
  var f=d.extractedFields||{};
  Object.keys(f).forEach(function(k){if(f[k]!=null&&f[k]!=='')D.f[k]=f[k]});
  if(d.assetType){
    D.f.assetType=d.assetType;
    // Auto-detect loan type if not set
    if(!D.type){
      if(d.assetType.indexOf('investment')>-1)D.type='investment';
      else if(d.assetType.indexOf('resi_dev')>-1)D.type='development';
      else if(d.assetType.indexOf('commercial_dev')>-1)D.type='development';
      else if(d.assetType==='land')D.type='site';
      else D.type='development';
    }
  }
  if(d.propertySubtype)D.f.propertySubtype=d.propertySubtype;
  if(d.valuationMethod)D.f.valuationMethod=d.valuationMethod;
  if(d.confidence)D.f.confidence=Math.max(D.f.confidence||0,d.confidence);
  if(d.flags&&d.flags.length)D.flags=D.flags.concat(d.flags);
  if(d.narrative&&d.narrative.length>(D.narrative||'').length)D.narrative=d.narrative;
  if(d.summary)D.f.summary=d.summary;
  // Also merge unit breakdown if present
  if(f.unitBreakdown&&f.unitBreakdown.length){D.f.unitBreakdown=f.unitBreakdown;if(!D.f.units)D.f.units=f.unitBreakdown.length;}
}

function showExtracted(){
  console.log('All extracted fields:',JSON.stringify(D.f));
  var f=D.f;var lines=[];
  function s(k,h){if(f[k]&&!D.shown[k]){D.shown[k]=true;lines.push(h);}}
  if(f.address&&!D.shown.address){D.shown.address=true;var mu='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(f.address);lines.push('<strong>📍 '+f.address+'</strong> <a href="'+mu+'" target="_blank">[Google Maps ↗]</a>');}
  if((f.borrowerName||f.entityName)&&!D.shown.borrower){D.shown.borrower=true;lines.push('<strong>Borrower:</strong> '+(f.borrowerName||f.entityName));}
  s('assetType','<strong>Asset:</strong> '+(f.propertySubtype||f.assetType||'').replace(/_/g,' '));
  s('zoning','<strong>Zoning:</strong> '+f.zoning);
  if(f.landArea&&!D.shown.landArea){D.shown.landArea=true;lines.push('<strong>Land:</strong> '+Number(f.landArea).toLocaleString('en-AU')+'m²');}
  if((f.grv||f.adoptedValue)&&!D.shown.grv){D.shown.grv=true;lines.push('<strong>GRV / Value:</strong> '+fmt(f.grv||f.adoptedValue));}
  if(f.grossIncome&&!D.shown.gi){D.shown.gi=true;lines.push('<strong>Gross Income:</strong> '+fmt(f.grossIncome)+' p.a.');}
  if(f.netIncome&&!D.shown.ni){D.shown.ni=true;lines.push('<strong>Net Income:</strong> '+fmt(f.netIncome)+' p.a.');}
  s('capRate','<strong>Cap Rate:</strong> '+pct(f.capRate));
  if(f.tenantName&&!D.shown.tenant){D.shown.tenant=true;lines.push('<strong>Tenant:</strong> '+f.tenantName+(f.tenantCovenant?' ('+f.tenantCovenant+')':''));}
  if(f.leaseTermRemaining&&!D.shown.lease){D.shown.lease=true;lines.push('<strong>Lease:</strong> '+f.leaseTermRemaining+' yrs remaining');}
  if(f.units&&!D.shown.units){D.shown.units=true;lines.push('<strong>Units:</strong> '+f.units+(f.avgPrice?' @ '+fmt(f.avgPrice)+' avg':''));}
  s('constructionCost','<strong>Construction:</strong> '+fmt(f.constructionCost));
  if((f.landValue||f.landCost)&&!D.shown.lv){D.shown.lv=true;lines.push('<strong>Land Cost:</strong> '+fmt(f.landValue||f.landCost));}
  if(f.presalesCount&&!D.shown.ps){D.shown.ps=true;lines.push('<strong>Presales:</strong> '+f.presalesCount+' ('+fmt(f.presalesValue)+')');}
  s('builder','<strong>Builder:</strong> '+f.builder);
  s('architect','<strong>Architect:</strong> '+f.architect);

  if(lines.length>0){
    ab((D.docs.length>1?'More details extracted:':'Here\'s what I extracted:')+'<br><br>'+lines.join('<br>')+'<br><br>Upload more docs or I\'ll ask remaining questions.');
  } else if(D.docs.length>1){
    ab('No new fields from this document. I\'ll continue.');
  } else {ab('Document processed. Let me ask some questions.');}

  if(D.flags.length>0){var nf=D.flags.filter(function(x){return!D.shown['fl_'+x]});if(nf.length){nf.forEach(function(x){D.shown['fl_'+x]=true});ab('<strong>⚠ Flags:</strong><br>'+nf.map(function(x){return'• '+x}).join('<br>'));}}
  if(!resultsShown)askNext();
}

function askNext(){
  var f=D.f;qq=[];
  function q(k,txt){if(!f[k]&&!D.asked[k])qq.push({k:k,q:txt});}
  
  q('address','What\'s the <strong>property address</strong>?');
  if(!f.borrowerName&&!f.entityName&&!D.asked.borrowerName)qq.push({k:'borrowerName',q:'<strong>Borrower / entity name</strong>?'});
  
  if(D.type==='development'||D.type==='site'){
    if(!f.grv&&!f.units&&!D.asked.grv)qq.push({k:'grv',q:'What\'s the <strong>GRV</strong>? Or number of units and avg price.'});
    q('landValue','<strong>Land / purchase price</strong>?');
    if(!f.landValue&&!f.landCost&&!D.asked.landValue){}// already pushed above
    q('constructionCost','<strong>Total construction cost</strong> (ex GST)?');
  } else if(D.type==='investment'){
    if(!f.grossIncome&&!f.netIncome&&!D.asked.grossIncome)qq.push({k:'grossIncome',q:'<strong>Gross annual income</strong>?'});
    q('capRate','<strong>Cap rate</strong>?');
  } else if(D.type==='residual'){
    q('units','How many <strong>total units/lots</strong>?');
    q('grv','<strong>Total value of unsold stock</strong>?');
  } else if(D.type==='bridging'){
    q('grv','<strong>Current property value</strong>?');
    q('loanAmount','How much do you need to <strong>borrow</strong>?');
  }

  if(qq.length>0){curQ=qq.shift();D.asked[curQ.k]=true;setTimeout(function(){ab(curQ.q)},400);}
  else{resultsShown=true;setTimeout(showResults,500);}
}

function sendMsg(){
  var inp=$('inp');var msg=inp.value.trim();if(!msg)return;inp.value='';au(msg);
  if(curQ){var v=msg.replace(/[$,%]/g,'').replace(/,/g,'');if(!isNaN(v)&&v.length>0)v=parseFloat(v);D.f[curQ.k]=v;curQ=null;setTimeout(askNext,300);}
  else{at();hist.push({role:'user',content:msg});fetch('/.netlify/functions/ai-copilot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:D.f,history:hist.slice(-8)})}).then(function(r){return r.json()}).then(function(d){rt();var r=(d.reply||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');hist.push({role:'assistant',content:d.reply||''});ab(r)}).catch(function(){rt();ab('Connection error.')});}
}

function showResults(){
  var f=D.f;
  var addr=f.address||'Your Project';
  var ml=f.address?'<a href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(f.address)+'" target="_blank" style="font-size:11px">[Map ↗]</a>':'';
  var h='<div class="dc"><div class="dch"><h3>'+addr+' '+ml+'</h3>';
  if(f.borrowerName||f.entityName)h+='<div class="da">'+(f.borrowerName||f.entityName)+'</div>';
  h+='</div>';
  h+='<div class="ds">Property</div>';
  if(f.landArea)h+='<div class="dr"><span class="dl">Land Area</span><span class="dv">'+Number(f.landArea).toLocaleString('en-AU')+'m²</span></div>';
  if(f.zoning)h+='<div class="dr"><span class="dl">Zoning</span><span class="dv">'+f.zoning+'</span></div>';
  if(f.units)h+='<div class="dr"><span class="dl">Units / Lots</span><span class="dv">'+f.units+'</span></div>';
  if(f.tenantName)h+='<div class="dr"><span class="dl">Tenant</span><span class="dv">'+f.tenantName+'</span></div>';
  if(f.leaseTermRemaining)h+='<div class="dr"><span class="dl">Lease</span><span class="dv">'+f.leaseTermRemaining+' yrs</span></div>';

  if(D.type==='development'||D.type==='site'){
    var grv=Number(f.grv||f.adoptedValue)||0;var land=Number(f.landValue||f.landCost)||0;var con=Number(f.constructionCost)||0;
    var tpc=land+con;if(!tpc)tpc=grv*0.7;var margin=grv-tpc;var mp=tpc>0?margin/tpc:0;
    var sr=tpc*0.65;var ltc=tpc>0?sr/tpc:0;var eq=tpc-sr;
    var mc=mp>=0.2?'g':mp>=0.15?'w':'b';var lc=ltc<=0.65?'g':ltc<=0.75?'w':'b';
    var vt=mp>=0.2?'✓ Bankable — strong margin':mp>=0.15?'⚠ Marginal — lender dependent':'✗ Below threshold — needs restructure';
    h+='<div class="ds">Feasibility</div>';
    h+='<div class="dr"><span class="dl">GRV</span><span class="dv t">'+fmt(grv)+'</span></div>';
    if(land)h+='<div class="dr"><span class="dl">Land Cost</span><span class="dv">'+fmt(land)+'</span></div>';
    if(con)h+='<div class="dr"><span class="dl">Construction</span><span class="dv">'+fmt(con)+'</span></div>';
    h+='<div class="dr"><span class="dl">Total Project Cost</span><span class="dv">'+fmt(tpc)+'</span></div>';
    h+='<div class="dr"><span class="dl">Dev Margin</span><span class="dv '+mc+'">'+fmt(margin)+' ('+pct(mp)+')</span></div>';
    h+='<div class="ds">Indicative Funding</div>';
    h+='<div class="dr"><span class="dl">Senior Debt</span><span class="dv">'+fmt(sr)+'</span></div>';
    h+='<div class="dr"><span class="dl">LTC</span><span class="dv '+lc+'">'+pct(ltc)+'</span></div>';
    h+='<div class="dr"><span class="dl">Equity</span><span class="dv">'+fmt(eq)+'</span></div>';
    h+='<div class="dvd '+mc+'">'+vt+'</div>';
  } else if(D.type==='residual'){
    var totVal=Number(f.grv||f.adoptedValue)||0;var units=Number(f.units)||0;
    var lvr=0.7;var advance=totVal*lvr;var rate=0.12;var term=18;var interest=advance*rate*(term/12);
    var coverage=advance>0?(totVal/advance):0;var cc=coverage>=1.4?'g':coverage>=1.2?'w':'b';
    var vt=coverage>=1.4?'✓ Strong security coverage':'⚠ Review coverage';
    h+='<div class="ds">Security Pool</div>';
    h+='<div class="dr"><span class="dl">Collateral Value</span><span class="dv t">'+fmt(totVal)+'</span></div>';
    if(units)h+='<div class="dr"><span class="dl">Unsold Units</span><span class="dv">'+units+'</span></div>';
    h+='<div class="ds">Indicative Facility</div>';
    h+='<div class="dr"><span class="dl">LVR</span><span class="dv">70%</span></div>';
    h+='<div class="dr"><span class="dl">Cash Advance</span><span class="dv">'+fmt(advance)+'</span></div>';
    h+='<div class="dr"><span class="dl">Rate (est.)</span><span class="dv">12.0%</span></div>';
    h+='<div class="dr"><span class="dl">Term</span><span class="dv">18 months</span></div>';
    h+='<div class="dr"><span class="dl">Est. Interest</span><span class="dv b">'+fmt(interest)+'</span></div>';
    h+='<div class="dr"><span class="dl">Coverage</span><span class="dv '+cc+'">'+coverage.toFixed(2)+'x</span></div>';
    h+='<div class="dvd '+cc+'">'+vt+'</div>';
  } else if(D.type==='investment'){
    var grv=Number(f.grv||f.adoptedValue||f.capitalisedValue)||0;
    var ni=Number(f.netIncome)||0;var gi=Number(f.grossIncome)||0;var cr=Number(f.capRate)||0;
    if(!grv&&ni&&cr)grv=ni/cr;var debt=grv*0.65;var eq=grv-debt;
    var dscr=ni>0&&debt>0?ni/(debt*0.06):0;var dc=dscr>=1.3?'g':dscr>=1.1?'w':'b';
    if(gi||ni){h+='<div class="ds">Income</div>';
    if(gi)h+='<div class="dr"><span class="dl">Gross Income</span><span class="dv">'+fmt(gi)+' p.a.</span></div>';
    if(ni)h+='<div class="dr"><span class="dl">Net Income</span><span class="dv t">'+fmt(ni)+' p.a.</span></div>';
    if(cr)h+='<div class="dr"><span class="dl">Cap Rate</span><span class="dv">'+pct(cr)+'</span></div>';}
    h+='<div class="ds">Valuation</div>';
    h+='<div class="dr"><span class="dl">Adopted Value</span><span class="dv t">'+fmt(grv)+'</span></div>';
    h+='<div class="ds">Funding</div>';
    h+='<div class="dr"><span class="dl">Senior Debt (65%)</span><span class="dv">'+fmt(debt)+'</span></div>';
    if(dscr>0)h+='<div class="dr"><span class="dl">DSCR</span><span class="dv '+dc+'">'+dscr.toFixed(2)+'x</span></div>';
    h+='<div class="dvd '+dc+'">'+(dscr>=1.3?'✓ Strong debt coverage':'⚠ Review DSCR')+'</div>';
  } else if(D.type==='bridging'){
    var val=Number(f.grv||f.adoptedValue)||0;var loan=Number(f.loanAmount)||val*0.65;
    var lvr=val>0?loan/val:0;var lc=lvr<=0.65?'g':lvr<=0.75?'w':'b';
    h+='<div class="ds">Facility</div>';
    h+='<div class="dr"><span class="dl">Value</span><span class="dv t">'+fmt(val)+'</span></div>';
    h+='<div class="dr"><span class="dl">Loan</span><span class="dv">'+fmt(loan)+'</span></div>';
    h+='<div class="dr"><span class="dl">LVR</span><span class="dv '+lc+'">'+pct(lvr)+'</span></div>';
    h+='<div class="dvd '+lc+'">'+(lvr<=0.65?'✓ Within appetite':'⚠ Elevated LVR')+'</div>';
  }
  h+='</div>';
  if(D.narrative)h+='<div class="nar"><strong>AI Credit Summary:</strong><br><br>'+D.narrative.replace(/\n/g,'<br>')+'</div>';
  ab(h);
  setTimeout(function(){
    var m=$('msgs');
    m.innerHTML+='<div class="pw"><h2>Your credit paper is ready to generate</h2><p>Sign up to save this deal, generate a full credit paper with cash flows, and send for e-signing.</p><div class="pf"><span class="pfi">Full credit paper</span><span class="pfi">Cash flow modelling</span><span class="pfi">Lender matching</span><span class="pfi">DocuSeal e-signing</span><span class="pfi">Settlement tracking</span></div><a class="pwb" href="login.html?signup=true&type='+D.type+'">Create free account →</a><p style="margin-top:12px;font-size:11px;opacity:0.4">Free tier: 5 deals/month · 2 team members · Full AI</p></div>';
    m.scrollTop=m.scrollHeight;
  },800);
}
