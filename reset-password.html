<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>getkredit.ai — Set New Password</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0D9488;--teal-light:#14B8A6;--teal-dark:#0F766E;--teal-bg:#F0FDFA;--teal-subtle:#CCFBF1;
  --white:#ffffff;--grey50:#f8fafc;--grey100:#f1f5f9;--grey200:#e2e8f0;
  --grey500:#64748b;--grey600:#475569;--grey700:#334155;--grey800:#1e293b;--grey900:#0f172a;
  --text:#0f172a;--border:#e2e8f0;--green:#059669;--red:#dc2626;
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--grey50)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:420px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.logo{font-family:'Source Serif 4',serif;font-size:24px;font-weight:700;color:var(--grey900);text-align:center;margin-bottom:8px}
.logo span{color:var(--teal)}
.sub{text-align:center;font-size:14px;color:var(--grey500);margin-bottom:32px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--grey700);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);transition:border-color 0.2s;background:var(--white)}
.form-input:focus{outline:none;border-color:var(--teal)}
.btn{width:100%;padding:12px;background:var(--teal);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-top:8px}
.btn:hover{background:var(--teal-dark)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:14px;display:none}
.msg.error{display:block;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.15);color:var(--red)}
.msg.success{display:block;background:rgba(5,150,105,0.06);border:1px solid rgba(5,150,105,0.15);color:var(--green)}
.strength{height:3px;border-radius:2px;margin-top:6px;background:var(--grey200);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0}
.strength-text{font-size:11px;color:var(--grey500);margin-top:4px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">get<span>kredit.ai</span></div>

    <!-- STATE: loading / verifying token -->
    <div id="state-loading">
      <div class="sub">Verifying your reset link…</div>
      <div style="text-align:center;padding:20px 0">
        <div class="spinner" style="border-color:rgba(13,148,136,0.3);border-top-color:var(--teal);width:28px;height:28px;border-width:3px"></div>
      </div>
    </div>

    <!-- STATE: set new password form -->
    <div id="state-form" style="display:none">
      <div class="sub">Choose a new password for your account.</div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="new-password" placeholder="Min 8 characters" oninput="checkStrength(this.value)">
        <div class="strength"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-text" id="strength-text"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="Re-enter password">
      </div>
      <button class="btn" id="set-btn" onclick="setPassword()">Set New Password</button>
      <div id="set-msg" class="msg"></div>
    </div>

    <!-- STATE: invalid / expired link -->
    <div id="state-invalid" style="display:none">
      <div class="sub" style="color:var(--red)">This reset link is invalid or has expired.</div>
      <p style="font-size:13px;color:var(--grey600);text-align:center;margin-bottom:24px">Reset links expire after 1 hour. Please request a new one.</p>
      <a href="login.html" style="display:block;text-align:center;padding:12px;background:var(--teal);color:white;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">Back to Sign In</a>
    </div>

    <!-- STATE: success -->
    <div id="state-success" style="display:none">
      <div class="sub" style="color:var(--green)">Password updated successfully!</div>
      <p style="font-size:13px;color:var(--grey600);text-align:center;margin-bottom:24px">You can now sign in with your new password.</p>
      <a href="login.html" style="display:block;text-align:center;padding:12px;background:var(--teal);color:white;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">Go to Sign In</a>
    </div>

  </div>
</div>

<script>
var sb = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);

function show(id) {
  ['state-loading','state-form','state-invalid','state-success'].forEach(function(s) {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function checkStrength(pw) {
  var fill = document.getElementById('strength-fill');
  var text = document.getElementById('strength-text');
  if (!pw) { fill.style.width = '0'; text.textContent = ''; return; }
  var score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  var labels = ['','Weak','Fair','Good','Strong','Very strong'];
  var colours = ['','#dc2626','#d97706','#ca8a04','#059669','#0D9488'];
  var pct = (score / 5 * 100) + '%';
  fill.style.width = pct;
  fill.style.background = colours[score] || colours[1];
  text.textContent = labels[score] || '';
  text.style.color = colours[score] || colours[1];
}

async function setPassword() {
  var pw = document.getElementById('new-password').value;
  var pw2 = document.getElementById('confirm-password').value;
  var msg = document.getElementById('set-msg');
  var btn = document.getElementById('set-btn');

  msg.className = 'msg'; msg.textContent = '';

  if (!pw || pw.length < 8) {
    msg.className = 'msg error'; msg.textContent = 'Password must be at least 8 characters.'; return;
  }
  if (pw !== pw2) {
    msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Updating…';

  var result = await sb.auth.updateUser({ password: pw });

  if (result.error) {
    msg.className = 'msg error';
    msg.textContent = result.error.message || 'Could not update password. The link may have expired.';
    btn.disabled = false; btn.textContent = 'Set New Password';
    return;
  }

  show('state-success');
}

// On load: check URL for Supabase auth tokens
// Supabase puts tokens in the hash as #access_token=...&type=recovery
async function init() {
  // Let Supabase SDK parse the hash automatically
  var { data: { session }, error } = await sb.auth.getSession();

  if (session && session.user) {
    // Valid recovery session — show form
    show('state-form');
    return;
  }

  // Also listen for the AUTH_STATE_CHANGE event which fires when hash is parsed
  sb.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      show('state-form');
    } else if (event === 'SIGNED_IN' && session) {
      // Already handled
    }
  });

  // Give it a moment to parse the hash
  setTimeout(async function() {
    var { data: { session: s } } = await sb.auth.getSession();
    if (!s) {
      // Check if there's a hash at all — if not, it's a direct page visit
      var hash = window.location.hash;
      if (!hash || hash.indexOf('access_token') === -1) {
        show('state-invalid');
      }
      // If hash exists but session still null, likely expired
      else {
        show('state-invalid');
      }
    }
  }, 1500);
}

init();
</script>
</body>
</html>
