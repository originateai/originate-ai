<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>getkredit.ai — My Deals</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.3/supabase.min.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0D9488;--teal-light:#14B8A6;--teal-dark:#0F766E;--teal-bg:#F0FDFA;--teal-subtle:#CCFBF1;
  --white:#ffffff;--grey50:#f8fafc;--grey100:#f1f5f9;--grey200:#e2e8f0;
  --grey500:#64748b;--grey600:#475569;--grey700:#334155;--grey800:#1e293b;--grey900:#0f172a;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--grey50);min-height:100vh}

.nav{height:64px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:10}
.nav-logo{font-family:'Source Serif 4',serif;font-size:21px;font-weight:700;color:var(--grey900);text-decoration:none}
.nav-logo span{color:var(--teal)}
.nav-right{display:flex;gap:16px;align-items:center}
.nav-user{font-size:13px;color:var(--grey600)}
.nav-link{font-size:13px;color:var(--grey500);text-decoration:none;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);transition:all 0.15s;background:var(--white)}
.nav-link:hover{border-color:var(--teal);color:var(--teal)}
.nav-link.logout{color:var(--red);border-color:transparent}
.nav-link.logout:hover{background:rgba(220,38,38,0.05)}

.container{max-width:1100px;margin:0 auto;padding:32px 40px}
.page-title{font-family:'Source Serif 4',serif;font-size:28px;font-weight:700;color:var(--grey900);margin-bottom:4px}
.page-sub{font-size:14px;color:var(--grey500);margin-bottom:32px}

.deal-grid{display:grid;gap:16px}
.deal-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all 0.2s;cursor:pointer}
.deal-card:hover{border-color:var(--teal-subtle);box-shadow:0 4px 16px rgba(13,148,136,0.06)}
.deal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.deal-title{font-size:16px;font-weight:600;color:var(--grey900)}
.deal-address{font-size:13px;color:var(--grey500);margin-top:2px}
.deal-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.badge-draft{background:var(--grey100);color:var(--grey600)}
.badge-feasibility{background:var(--teal-bg);color:var(--teal-dark)}
.badge-submitted{background:rgba(37,99,235,0.08);color:#2563EB}
.badge-review{background:rgba(217,119,6,0.08);color:var(--amber)}
.badge-approved{background:rgba(5,150,105,0.08);color:var(--green)}
.badge-declined{background:rgba(220,38,38,0.06);color:var(--red)}

.deal-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.deal-metric{text-align:center}
.dm-val{font-size:18px;font-weight:600;color:var(--grey900)}
.dm-val.teal{color:var(--teal)}
.dm-val.green{color:var(--green)}
.dm-val.amber{color:var(--amber)}
.dm-val.red{color:var(--red)}
.dm-label{font-size:10px;color:var(--grey500);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

.deal-footer{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--grey500)}
.deal-type{display:flex;gap:8px;align-items:center}
.deal-type-badge{padding:3px 8px;border-radius:4px;background:var(--grey100);font-size:11px;color:var(--grey600);font-weight:500}

.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-title{font-size:18px;font-weight:600;color:var(--grey700);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--grey500);margin-bottom:24px}
.empty-cta{display:inline-block;padding:12px 24px;background:var(--teal);color:white;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none;transition:all 0.2s}
.empty-cta:hover{background:var(--teal-dark)}

.loading{text-align:center;padding:60px;color:var(--grey500);font-size:14px}

@media(max-width:768px){
  .container{padding:20px}
  .deal-metrics{grid-template-columns:repeat(2,1fr)}
  .nav{padding:0 20px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">get<span>kredit.ai</span></a>
  <div class="nav-right">
    <span class="nav-user" id="user-name"></span>
    <a class="nav-link" href="development-chat.html">+ New Deal</a>
    <a class="nav-link logout" href="#" onclick="doLogout()">Sign Out</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">My Deals</div>
  <div class="page-sub">Track your development finance applications</div>

  <div id="loading" class="loading">Loading your deals...</div>
  <div id="deals-grid" class="deal-grid" style="display:none"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">📋</div>
    <div class="empty-title">No deals yet</div>
    <div class="empty-sub">Start your first development finance application and it will appear here.</div>
    <a class="empty-cta" href="development-chat.html">Start Application →</a>
  </div>
</div>

<script>
var SUPABASE_URL = SUPABASE_CONFIG.url;
var SUPABASE_KEY = SUPABASE_CONFIG.key;
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function fd(v) {
  if (!v && v !== 0) return "—";
  return new Intl.NumberFormat("en-AU",{style:"currency",currency:"AUD",minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
}
function fp(v) { return (!v && v !== 0) ? "—" : (v * 100).toFixed(1) + "%"; }

function statusBadge(status) {
  var map = {
    draft: ["Draft","badge-draft"],
    feasibility_complete: ["Feasibility Complete","badge-feasibility"],
    submitted: ["Submitted","badge-submitted"],
    under_review: ["Under Review","badge-review"],
    approved: ["Approved","badge-approved"],
    declined: ["Declined","badge-declined"],
    settled: ["Settled","badge-approved"],
    withdrawn: ["Withdrawn","badge-draft"]
  };
  var m = map[status] || ["Unknown","badge-draft"];
  return '<span class="deal-badge ' + m[1] + '">' + m[0] + '</span>';
}

function lvrColor(v) {
  if (!v) return "";
  if (v <= 0.65) return "green";
  if (v <= 0.70) return "amber";
  return "red";
}

function renderDeals(deals) {
  document.getElementById("loading").style.display = "none";
  if (!deals || deals.length === 0) {
    document.getElementById("empty-state").style.display = "block";
    return;
  }
  var grid = document.getElementById("deals-grid");
  grid.style.display = "grid";
  grid.innerHTML = deals.map(function(d) {
    var date = new Date(d.created_at).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});
    return '<div class="deal-card" onclick="viewDeal(\'' + d.id + '\')">'
      + '<div class="deal-header">'
      + '<div><div class="deal-title">' + (d.borrower_name || "Unnamed Deal") + '</div>'
      + '<div class="deal-address">' + (d.address || "No address") + '</div></div>'
      + statusBadge(d.status)
      + '</div>'
      + '<div class="deal-metrics">'
      + '<div class="deal-metric"><div class="dm-val teal">' + fd(d.calc_facility) + '</div><div class="dm-label">Facility</div></div>'
      + '<div class="deal-metric"><div class="dm-val ' + lvrColor(d.calc_lvr) + '">' + fp(d.calc_lvr) + '</div><div class="dm-label">LVR</div></div>'
      + '<div class="deal-metric"><div class="dm-val">' + fp(d.calc_ltc) + '</div><div class="dm-label">LTC</div></div>'
      + '<div class="deal-metric"><div class="dm-val">' + fp(d.calc_poc) + '</div><div class="dm-label">Profit/Cost</div></div>'
      + '</div>'
      + '<div class="deal-footer">'
      + '<div class="deal-type"><span class="deal-type-badge">' + (d.category || "—") + '</span><span class="deal-type-badge">' + (d.sub_category || "—") + '</span></div>'
      + '<span>' + date + '</span>'
      + '</div></div>';
  }).join("");
}

function viewDeal(id) {
  // Future: open deal detail view
  alert("Deal detail view coming soon. Deal ID: " + id);
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

async function init() {
  var session = await sb.auth.getSession();
  if (!session.data.session) {
    // No auth yet — show all deals for now (will restrict later)
    // window.location.href = "login.html";
    // return;
  }

  var user = session.data.session ? session.data.session.user : null;
  if (user) {
    var name = user.user_metadata && user.user_metadata.full_name;
    document.getElementById("user-name").textContent = name || user.email;
  }

  // Fetch deals — for now fetch all (will filter by user later)
  try {
    var res = await fetch("/.netlify/functions/supabase", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({action:"get_deals"})
    });
    var json = await res.json();
    // Fallback: direct Supabase query
    if (!json.success) {
      var sbRes = await sb.from("deals").select("*").order("created_at",{ascending:false});
      renderDeals(sbRes.data || []);
    } else {
      renderDeals(json.deals || []);
    }
  } catch(e) {
    // Direct Supabase query as fallback
    var sbRes = await sb.from("deals").select("*").order("created_at",{ascending:false});
    renderDeals(sbRes.data || []);
  }
}
init();
</script>
</body>
</html>
